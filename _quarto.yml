project:
  type: website

website:
  description: "Notes on actuarial modeling, yield curves, solvency capital, and quantitative risk management."
  site-url: https://kelvin1189.github.io/actuarial-modeling-notes/ # you must change this appropriately for RSS feeds to work properly
  repo-url: https://github.com/kelvin1189/actuarial-modeling-notes
  repo-actions: [issue]

  title: "WONG | Notes"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/kelvin1189
        aria-label: GitHub

  page-footer:
    left: "© 2026 WONG"
    right:
      - icon: github
        href: https://github.com/kelvin1189

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    highlight-style:
      light: github
      dark: github-dark
    respect-user-color-scheme: true
    toc: true
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
    smooth-scroll: true


